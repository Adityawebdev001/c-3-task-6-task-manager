<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aura - Sleek, high-performance personal task manager.">
    <title>Aura Tasks</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Main App Layout -->
    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" aria-label="Main Navigation">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-dot"></span>
                    <span class="logo-text">Aura</span>
                </div>
                <button id="theme-toggle-btn" class="theme-btn" aria-label="Toggle dark/light mode">
                    <i class="fa-solid fa-moon moon-icon"></i>
                    <i class="fa-solid fa-sun sun-icon"></i>
                </button>
            </div>

            <!-- User Profile (Human Touch) -->
            <div class="user-profile">
                <div class="avatar">AJ</div>
                <div class="user-info">
                    <span class="user-name">Aditya Jain</span>
                    <span class="user-role">Workspace Owner</span>
                </div>
            </div>

            <!-- Sidebar Navigation Menu -->
            <nav class="sidebar-nav">
                <div class="nav-section-title">Collections</div>
                <ul class="nav-list" id="category-filter-container">
                    <li>
                        <button class="nav-item active" data-filter="all">
                            <span class="nav-icon"><i class="fa-solid fa-inbox"></i></span>
                            <span class="nav-label">All Tasks</span>
                            <span class="nav-count" id="count-all-sidebar">0</span>
                        </button>
                    </li>
                    <li>
                        <button class="nav-item" data-filter="work">
                            <span class="nav-icon nav-work"><i class="fa-solid fa-briefcase"></i></span>
                            <span class="nav-label">Work</span>
                            <span class="nav-count" id="count-work-sidebar">0</span>
                        </button>
                    </li>
                    <li>
                        <button class="nav-item" data-filter="personal">
                            <span class="nav-icon nav-personal"><i class="fa-solid fa-user"></i></span>
                            <span class="nav-label">Personal</span>
                            <span class="nav-count" id="count-personal-sidebar">0</span>
                        </button>
                    </li>
                    <li>
                        <button class="nav-item" data-filter="shopping">
                            <span class="nav-icon nav-shopping"><i class="fa-solid fa-cart-shopping"></i></span>
                            <span class="nav-label">Shopping</span>
                            <span class="nav-count" id="count-shopping-sidebar">0</span>
                        </button>
                    </li>
                    <li>
                        <button class="nav-item" data-filter="urgent">
                            <span class="nav-icon nav-urgent"><i class="fa-solid fa-fire-flame-curved"></i></span>
                            <span class="nav-label">Urgent</span>
                            <span class="nav-count" id="count-urgent-sidebar">0</span>
                        </button>
                    </li>
                </ul>
            </nav>

            <!-- Sidebar Stats Panel -->
            <div class="sidebar-footer">
                <div class="stats-row">
                    <span class="stats-label">Pending</span>
                    <span id="counter-pending" class="stats-val">0</span>
                </div>
                <div class="stats-row">
                    <span class="stats-label">Completed</span>
                    <span id="counter-completed" class="stats-val done">0</span>
                </div>
                <!-- Hidden inputs/elements needed for background state mapping (safe checks) -->
                <span id="counter-all" style="display:none;">0</span>
            </div>
        </aside>

        <!-- Main Task Board -->
        <main class="main-content">
            <!-- Header Bar -->
            <header class="content-header">
                <div class="header-left">
                    <h1 class="view-title" id="current-view-title">All Tasks</h1>
                </div>
                
                <div class="header-right">
                    <div class="search-bar">
                        <i class="fa-solid fa-magnifying-glass search-icon"></i>
                        <input type="text" id="search-input" placeholder="Search tasks..." autocomplete="off">
                    </div>
                    <button id="clear-all-btn" class="btn-clear" title="Clear all tasks from this list">
                        <i class="fa-regular fa-trash-can"></i>
                    </button>
                </div>
            </header>

            <!-- Board Workspace -->
            <div class="workspace-body">
                <!-- Inline Task Creation Form (Todoist/Linear Style) -->
                <form id="task-form" class="inline-add-form" novalidate>
                    <div class="form-row">
                        <input type="text" id="task-title" class="add-input" placeholder="Add a task to current list..." required autocomplete="off">
                        
                        <div class="form-actions">
                            <select id="task-category" class="category-select" title="Choose Category">
                                <option value="work">💼 Work</option>
                                <option value="personal">👤 Personal</option>
                                <option value="shopping">🛒 Shopping</option>
                                <option value="urgent">🔥 Urgent</option>
                            </select>
                            <button type="submit" id="add-task-btn" class="add-submit-btn" aria-label="Add task">
                                <i class="fa-solid fa-plus"></i>
                            </button>
                        </div>
                    </div>
                    <span id="title-error" class="validation-error">Please fill in task title</span>
                </form>

                <!-- Task Cards List -->
                <div id="task-list" class="task-list-container">
                    <!-- Empty State -->
                    <div id="empty-state" class="empty-state">
                        <div class="empty-illustration">
                            <i class="fa-solid fa-circle-check"></i>
                        </div>
                        <h3>All caught up</h3>
                        <p>No active tasks found. Go ahead and add some tasks to organize your schedule.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
